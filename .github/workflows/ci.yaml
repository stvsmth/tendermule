name: CICD

env:
  MIN_SUPPORTED_RUST_VERSION: "1.85.0"
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  code_checks:
    name: Run formatter, clippy, tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run formatter
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features
      - name: Run tests
        run: cargo test --locked

  msrv:
    name: Check MSRV (1.85.0)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MIN_SUPPORTED_RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --locked --all-targets --all-features

  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    needs: code_checks
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-apple-darwin,       os: macos-14     }
          - { target: aarch64-unknown-linux-gnu,   os: ubuntu-24.04 }
          - { target: x86_64-pc-windows-msvc,      os: windows-2022 }
          - { target: x86_64-unknown-linux-gnu,    os: ubuntu-24.04 }
          - { target: x86_64-unknown-linux-musl,   os: ubuntu-24.04 }

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.job.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation prerequisites
        if: matrix.job.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get -y update
          sudo apt-get -y install gcc-aarch64-linux-gnu

      - name: Set linker for cross target
        if: matrix.job.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> $GITHUB_ENV

      - name: Build
        run: cargo build --locked --release --target=${{ matrix.job.target }}

      - name: Strip and package
        id: package
        shell: bash
        run: |
          EXE_SUFFIX=""
          case ${{ matrix.job.target }} in
            *-pc-windows-*) EXE_SUFFIX=".exe" ;;
          esac

          STRIP="strip"
          case ${{ matrix.job.target }} in
            aarch64-unknown-linux-gnu) STRIP="aarch64-linux-gnu-strip" ;;
            *-pc-windows-msvc)         STRIP="" ;;
          esac

          BIN_NAME="${PROJECT_NAME}${EXE_SUFFIX}"
          BIN_PATH="target/${{ matrix.job.target }}/release/${BIN_NAME}"

          if [ -n "${STRIP}" ]; then
            "${STRIP}" "${BIN_PATH}"
          fi

          PKG_NAME="${PROJECT_NAME}-v${PROJECT_VERSION}-${{ matrix.job.target }}"
          STAGING="${{ env.CICD_INTERMEDIATES_DIR }}/${PKG_NAME}"
          mkdir -p "${STAGING}"
          cp "${BIN_PATH}" README.md LICENSE CHANGELOG.md "${STAGING}/"

          case ${{ matrix.job.target }} in
            *-pc-windows-*)
              PKG_FILE="${PKG_NAME}.zip"
              (cd "${{ env.CICD_INTERMEDIATES_DIR }}" && 7z a "${PKG_FILE}" "${PKG_NAME}/")
              ;;
            *)
              PKG_FILE="${PKG_NAME}.tar.gz"
              (cd "${{ env.CICD_INTERMEDIATES_DIR }}" && tar czf "${PKG_FILE}" "${PKG_NAME}/")
              ;;
          esac

          echo "PKG_FILE=${{ env.CICD_INTERMEDIATES_DIR }}/${PKG_FILE}" >> $GITHUB_OUTPUT
          echo "PKG_NAME=${PKG_NAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.package.outputs.PKG_NAME }}
          path: ${{ steps.package.outputs.PKG_FILE }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.package.outputs.PKG_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

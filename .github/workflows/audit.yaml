name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run audit
        run: cargo audit

[package]
name = "tendermule"
version = "0.2.2"
edition = "2021"
repository = "https://github.com/stvsmth/tendermule-rs"
description = "Generate a possibly amusing random identifier"
license-file = "LICENSE"

[dependencies]
anyhow = "1.0"
bincode = "1.3"
clap-num = "1.0"
clap = { version = "4.2", features = ["derive", "env"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }

[[bin]]
name = "replay"
path = "src/replay.rs"

[[bin]]
name = "tendermule"
path = "src/main.rs"
